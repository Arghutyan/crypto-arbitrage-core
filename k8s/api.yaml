apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-api
  labels:
    app: crypto-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crypto-api
  template:
    metadata:
      labels:
        app: crypto-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: crypto-api
          image: ghcr.io/arghutyan/crypto-arbitrage-core:latest
          imagePullPolicy: Always
          command:
            ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # Single connection-string standard, matching docker-compose.
            # TODO: migrate credentials into the app-secrets Secret.
            - name: DATABASE_URL
              value: "postgresql+asyncpg://db_user:changeme@postgres-service:5432/crypto_analytics"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

---

apiVersion: v1
kind: Service
metadata:
  name: api-service
  labels:
    app: crypto-api
spec:
  type: ClusterIP
  selector:
    app: crypto-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
