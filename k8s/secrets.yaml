# Application secrets. Replace the placeholder token before applying, or create
# the secret out-of-band so it is never committed:
#
#   kubectl create secret generic app-secrets \
#     --from-literal=TELEGRAM_BOT_TOKEN='123456:abc...'
#
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  labels:
    app: crypto-arb
type: Opaque
stringData:
  TELEGRAM_BOT_TOKEN: ""   # <-- set your @BotFather token here
  TELEGRAM_ADMIN_IDS: ""   # <-- comma-separated Telegram ids for /blacklist
