name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  CORE_IMAGE: ghcr.io/arghutyan/crypto-arbitrage-core
  API_IMAGE: ghcr.io/arghutyan/crypto-arbitrage-api
  FRONTEND_IMAGE: ghcr.io/arghutyan/crypto-arbitrage-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for engine image
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CORE_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Extract metadata for API image
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          file: ./api/Dockerfile
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${SERVER_HOST:-}" ]; then
            echo "::error::SERVER_HOST secret is empty or not set."
            missing=1
          fi

          if [ -z "${SERVER_USER:-}" ]; then
            echo "::error::SERVER_USER secret is empty or not set."
            missing=1
          fi

          if [ -z "${SERVER_SSH_KEY:-}" ]; then
            echo "::error::SERVER_SSH_KEY secret is empty or not set."
            missing=1
          else
            # Verify the key looks like a real OpenSSH private key without leaking it.
            first_line="$(printf '%s\n' "$SERVER_SSH_KEY" | head -n 1)"
            case "$first_line" in
              "-----BEGIN OPENSSH PRIVATE KEY-----"|"-----BEGIN RSA PRIVATE KEY-----"|"-----BEGIN EC PRIVATE KEY-----"|"-----BEGIN PRIVATE KEY-----")
                echo "SERVER_SSH_KEY is present and has a valid PEM header."
                ;;
              *)
                echo "::error::SERVER_SSH_KEY does not start with a recognized private key header. Make sure the full key (including BEGIN/END lines and newlines) is stored in the secret."
                missing=1
                ;;
            esac
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required deployment secrets are missing or malformed. Aborting before SSH."
            exit 1
          fi

          echo "All required deployment secrets are present."

      - name: Deploy to server (rollout restart)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e
            export KUBECONFIG=~/.kube/config
            kubectl rollout restart deployment/crypto-arb-engine
            kubectl rollout restart deployment/crypto-api
