apiVersion: apps/v1
kind: Deployment
metadata:
  name: crypto-bot
  labels:
    app: crypto-bot
spec:
  # The aiogram bot uses Telegram long polling, so it must stay a single
  # replica — two pods would fight over getUpdates and drop messages.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: crypto-bot
  template:
    metadata:
      labels:
        app: crypto-bot
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: crypto-bot
          image: ghcr.io/arghutyan/crypto-arbitrage-core:latest
          imagePullPolicy: Always
          # Same core image as the engine/api; the command selects the bot role.
          command: ["python", "-m", "bot"]
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: spread-app-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql+asyncpg://db_user:$(POSTGRES_PASSWORD)@postgres-service:5432/crypto_analytics"
            # The bot is useless without a token, so this ref is required
            # (no optional: true) — the pod will fail fast if it is missing.
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: spread-app-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: TELEGRAM_ADMIN_IDS
              valueFrom:
                secretKeyRef:
                  name: spread-app-secrets
                  key: TELEGRAM_ADMIN_IDS
                  optional: true
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
