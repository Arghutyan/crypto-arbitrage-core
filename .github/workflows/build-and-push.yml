name: Build and Push Docker Images

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  # Single backend image serves all three roles (engine / api / bot); the
  # container command selects the role. There is no separate API image.
  CORE_IMAGE: ghcr.io/arghutyan/crypto-arbitrage-core
  FRONTEND_IMAGE: ghcr.io/arghutyan/crypto-arbitrage-frontend
  # Inlined into the Next.js client bundle at image build time.
  NEXT_PUBLIC_API_URL: http://api.arbitcrypto.xyz

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for engine image
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CORE_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push engine image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          cache-from: type=gha,scope=core
          cache-to: type=gha,mode=max,scope=core

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Validate deployment secrets
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        run: |
          set -euo pipefail
          missing=0

          if [ -z "${SERVER_HOST:-}" ]; then
            echo "::error::SERVER_HOST secret is empty or not set."
            missing=1
          fi

          if [ -z "${SERVER_USER:-}" ]; then
            echo "::error::SERVER_USER secret is empty or not set."
            missing=1
          fi

          if [ -z "${TELEGRAM_BOT_TOKEN:-}" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN secret is empty or not set."
            missing=1
          fi

          if [ -z "${POSTGRES_PASSWORD:-}" ]; then
            echo "::error::POSTGRES_PASSWORD secret is empty or not set."
            missing=1
          fi

          if [ -z "${SERVER_SSH_KEY:-}" ]; then
            echo "::error::SERVER_SSH_KEY secret is empty or not set."
            missing=1
          else
            # Verify the key looks like a real OpenSSH private key without leaking it.
            first_line="$(printf '%s\n' "$SERVER_SSH_KEY" | head -n 1)"
            case "$first_line" in
              "-----BEGIN OPENSSH PRIVATE KEY-----"|"-----BEGIN RSA PRIVATE KEY-----"|"-----BEGIN EC PRIVATE KEY-----"|"-----BEGIN PRIVATE KEY-----")
                echo "SERVER_SSH_KEY is present and has a valid PEM header."
                ;;
              *)
                echo "::error::SERVER_SSH_KEY does not start with a recognized private key header. Make sure the full key (including BEGIN/END lines and newlines) is stored in the secret."
                missing=1
                ;;
            esac
          fi

          if [ "$missing" -ne 0 ]; then
            echo "::error::One or more required deployment secrets are missing or malformed. Aborting before SSH."
            exit 1
          fi

          echo "All required deployment secrets are present."

      - name: Copy k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          source: "k8s"
          target: "~/app-deploy"

      - name: Deploy to server (sync secret + rollout restart)
        uses: appleboy/ssh-action@v1.0.3
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_IDS: ${{ secrets.TELEGRAM_ADMIN_IDS }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          # Forward the application secrets into the remote shell so kubectl can
          # build the Secret without them ever touching the repo or manifests.
          envs: TELEGRAM_BOT_TOKEN,TELEGRAM_ADMIN_IDS,POSTGRES_PASSWORD
          script: |
            set -euo pipefail
            export KUBECONFIG=~/.kube/config

            # 1. Upsert the application Secret so pods pick up fresh values.
            kubectl create secret generic spread-app-secrets \
              --from-literal=TELEGRAM_BOT_TOKEN="${TELEGRAM_BOT_TOKEN}" \
              --from-literal=TELEGRAM_ADMIN_IDS="${TELEGRAM_ADMIN_IDS:-}" \
              --from-literal=POSTGRES_PASSWORD="${POSTGRES_PASSWORD}" \
              --dry-run=client -o yaml | kubectl apply -f -

            # 2. Apply all manifests so any new/changed resources reach the
            #    cluster before we ask for a rollout (fixes NotFound errors
            #    on first deploy or after manifest renames).
            kubectl apply -f ~/app-deploy/k8s/

            # 3. Roll the Deployments — names must match metadata.name exactly.
            kubectl rollout restart deployment/crypto-arb-engine
            kubectl rollout restart deployment/crypto-api
            kubectl rollout restart deployment/crypto-bot
            kubectl rollout restart deployment/crypto-frontend

            # 4. Wait for all rollouts to finish so the pipeline reflects the
            #    real outcome rather than silently leaving pods in a bad state.
            kubectl rollout status deployment/crypto-arb-engine --timeout=120s
            kubectl rollout status deployment/crypto-api        --timeout=120s
            kubectl rollout status deployment/crypto-bot        --timeout=120s
            kubectl rollout status deployment/crypto-frontend   --timeout=120s
